name: Self-Tuning Loop (Weekly)

on:
  schedule:
    # Every Sunday at 09:00 UTC (18:00 KST). Scheduled runs are always dry-run;
    # a human must trigger workflow_dispatch with dry_run=false to actually
    # write a new guidelines version.
    - cron: '0 9 * * 0'
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to analyze and evolve'
        required: true
        default: 'email'
      dry_run:
        description: 'Preview changes without applying'
        type: boolean
        default: true

jobs:
  self-tune:
    runs-on: ubuntu-latest

    env:
      # Resolve once. Quoting these as shell vars (not direct ${{ }}
      # interpolation in `run:`) prevents injection via workflow_dispatch input.
      # DRY_RUN defaults to 'true' for the schedule trigger; only an explicit
      # workflow_dispatch with dry_run=false produces a real evolve.
      DOMAIN: ${{ inputs.domain || 'email' }}
      DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) && 'false' || 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Analyze diffs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run analyze -- "$DOMAIN" 7

      - name: Evolve guidelines
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "$DRY_RUN" = "false" ]; then
            npm run evolve -- "$DOMAIN"
          else
            npm run evolve -- "$DOMAIN" --dry-run
          fi

      - name: Quality score report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run score -- "$DOMAIN"
